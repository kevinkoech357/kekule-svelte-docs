<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#10b981" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect & DNS Prefetch to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <meta name="description" content="Svelte 5 wrapper for Kekule.js — render and edit organic compound structures from SMILES strings" />
    <meta property="og:title"       content="kekule-svelte — Svelte 5 chemistry components" />
    <meta property="og:description" content="KekuleViewer, KekuleEditor, KekuleReaction — Svelte 5 wrappers for Kekule.js" />
    <meta property="og:type"        content="website" />
    <meta name="twitter:card"       content="summary_large_image" />

    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme') || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          // Set initial background to prevent white flash
          document.documentElement.style.backgroundColor = theme === 'dark' ? '#0a0a0a' : '#ffffff';
        } catch (e) {}
      })();
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
